<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quick Quote">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-192.png">
<title>Quick Quote — Home Inspection Estimates</title>
<style>
:root{
  --ink:#0f172a; --paper:#fafaf9; --border:#e2e8f0; --muted:#94a3b8; --muted2:#64748b;
  --amber:#d97706; --amber-dark:#b45309; --amber-bg:#fffbeb; --red:#dc2626;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--paper);}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);}
input,textarea,button{font-family:inherit;}
button{cursor:pointer;background:none;border:none;}
.mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;}
#app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--paper);}
.icon{width:16px;height:16px;flex-shrink:0;}
.icon svg{width:100%;height:100%;}

.header{background:var(--ink);color:#fafaf9;padding:26px 20px 30px;position:relative;overflow:hidden;
  background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.07) 0,rgba(255,255,255,.07) 1px,transparent 1px,transparent 24px),
  repeating-linear-gradient(90deg,rgba(255,255,255,.07) 0,rgba(255,255,255,.07) 1px,transparent 1px,transparent 24px);}
.header .house{position:absolute;right:-18px;bottom:-22px;width:150px;height:150px;opacity:.08;}
.header-inner{position:relative;}
.eyebrow{color:#f59e0b;font-weight:700;letter-spacing:.18em;text-transform:uppercase;font-size:11px;margin-bottom:6px;}
.header h1{font-size:29px;margin:0;font-weight:800;letter-spacing:-.01em;}
.header .tag{color:#94a3b8;margin:4px 0 0;font-size:14px;}

.tabs{display:flex;border-bottom:1px solid var(--border);background:#fff;position:sticky;top:0;z-index:20;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:11px 4px;border-bottom:2px solid transparent;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;}
.tab.active{color:var(--ink);border-bottom-color:var(--amber);}
.tab .icon{width:18px;height:18px;}
.tab .badge{background:var(--ink);color:#fff;border-radius:99px;font-size:9px;padding:1px 6px;margin-left:3px;}

.section{padding:19px 20px;border-bottom:1px solid var(--border);}
.section-head{display:flex;align-items:baseline;gap:8px;margin-bottom:12px;}
.section-head .num{color:var(--amber);font-size:12px;font-weight:700;}
.section-head h2{font-size:12.5px;margin:0;text-transform:uppercase;letter-spacing:.08em;font-weight:700;}

.field{position:relative;margin-bottom:10px;}
.field:last-child{margin-bottom:0;}
.field .icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);}
.field input,.field textarea{width:100%;border:1px solid #cbd5e1;border-radius:10px;padding:11px 12px 11px 34px;font-size:15px;color:var(--ink);background:#fff;}
.field.no-icon input,.field.no-icon textarea{padding-left:12px;}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(217,119,6,.15);}
.field .suffix{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--muted);}
textarea{resize:none;}

.tier-grid{display:grid;grid-template-columns:1fr;gap:10px;}
@media(min-width:480px){.tier-grid{grid-template-columns:repeat(3,1fr);}}
.tier-card{position:relative;text-align:left;border:2px solid var(--border);border-radius:14px;padding:14px;background:#fff;width:100%;}
.tier-card.selected{border-color:var(--amber);background:var(--amber-bg);}
.tier-card .stamp{position:absolute;top:-10px;right:-8px;border:2px solid var(--amber);color:var(--amber-dark);background:#fff;font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:4px;transform:rotate(6deg);}
.tier-card .t-name{font-size:14px;font-weight:700;}
.tier-card .t-price{display:block;font-size:22px;font-weight:800;margin:4px 0;}
.tier-card .t-desc{font-size:12px;color:var(--muted2);line-height:1.4;}

.addon-row{width:100%;display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border);border-radius:10px;padding:11px 12px;background:#fff;margin-bottom:8px;text-align:left;}
.addon-row.selected{border-color:var(--amber);background:var(--amber-bg);}
.addon-row .left{display:flex;align-items:center;gap:10px;min-width:0;}
.addon-row .dot{width:20px;height:20px;border-radius:50%;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.addon-row.selected .dot{border-color:var(--amber);background:var(--amber);}
.addon-row .dot .icon{width:12px;height:12px;color:#fff;}
.addon-row .name{font-size:14px;}
.addon-row .price{font-size:14px;color:var(--muted2);flex-shrink:0;margin-left:8px;}

.footer{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--border);padding:14px 20px calc(14px + env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:space-between;gap:12px;}
.footer .label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
.footer .amount{font-size:24px;font-weight:800;}
.footer .save-btn{display:flex;align-items:center;gap:8px;background:var(--amber);color:#fff;font-weight:700;text-transform:uppercase;letter-spacing:.03em;font-size:13px;padding:12px 20px;border-radius:10px;}
.footer .save-btn .icon{width:16px;height:16px;}
.footer .save-btn:active{background:var(--amber-dark);}

.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty .icon{width:36px;height:36px;margin:0 auto 10px;color:#cbd5e1;}
.empty .t1{font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:13px;color:var(--muted2);}
.empty .t2{font-size:14px;margin-top:4px;}

.quote-card{border:1px solid var(--border);border-radius:14px;background:#fff;margin-bottom:10px;overflow:hidden;}
.quote-card .head{width:100%;display:flex;align-items:center;justify-content:space-between;padding:13px 15px;text-align:left;}
.quote-card .head .name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.quote-card .head .meta{font-size:12px;color:var(--muted);margin-top:2px;}
.quote-card .head .total{font-size:17px;font-weight:800;margin-left:10px;flex-shrink:0;}
.quote-card .detail{border-top:1px solid #f1f5f9;padding:12px 15px;}
.quote-card .detail .contact{font-size:13.5px;color:var(--muted2);margin-bottom:8px;}
.quote-card .detail .contact div{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
.quote-card .detail .line{display:flex;justify-content:space-between;font-size:13.5px;padding:2px 0;color:var(--muted2);}
.quote-card .detail .notes{font-size:13px;color:var(--muted2);font-style:italic;border-top:1px solid #f1f5f9;padding-top:8px;margin-top:6px;}
.quote-card .detail .sum{display:flex;justify-content:space-between;border-top:1px solid #f1f5f9;padding-top:8px;margin-top:6px;}
.quote-card .detail .sum .k{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;}
.quote-card .detail .sum .v{font-size:16px;font-weight:800;}

.confirm-row{display:flex;align-items:center;gap:8px;margin-top:10px;}
.confirm-row span{font-size:12px;color:var(--muted2);flex:1;}
.btn-outline{font-size:12px;padding:6px 12px;border-radius:8px;border:1px solid #cbd5e1;color:var(--muted2);}
.btn-danger{font-size:12px;padding:6px 12px;border-radius:8px;background:var(--red);color:#fff;}
.link-danger{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--red);margin-top:2px;}
.link-muted{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}

.search-field{position:relative;margin-bottom:14px;}
.search-field .icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);}
.search-field input{width:100%;border:1px solid #cbd5e1;border-radius:10px;padding:10px 12px 10px 34px;font-size:14px;}
.search-field input:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(217,119,6,.15);}

.settings-tier{border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:12px;}
.settings-tier .name-input{font-weight:700;font-size:14px;width:100%;border:none;padding:0;margin-bottom:8px;background:none;}
.settings-tier .name-input:focus{outline:none;}
.settings-row{display:flex;gap:8px;margin-bottom:8px;}
.settings-row .col{flex:1;}
.settings-row label{font-size:10.5px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:3px;}
.settings-row .prefixed{position:relative;}
.settings-row .prefixed span{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;}
.settings-row input{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:7px 8px 7px 8px;font-size:13.5px;}
.settings-row .prefixed input{padding-left:18px;}
.settings-tier .desc-input{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:7px 8px;font-size:13px;}

.addon-edit-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.addon-edit-row input.name{flex:1;min-width:0;border:1px solid #cbd5e1;border-radius:8px;padding:9px 10px;font-size:13.5px;}
.addon-edit-row .prefixed{position:relative;width:92px;flex-shrink:0;}
.addon-edit-row .prefixed span{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;}
.addon-edit-row .prefixed input{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:9px 10px 9px 18px;font-size:13.5px;}
.addon-edit-row button{color:var(--muted);flex-shrink:0;padding:4px;}
.add-addon-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--amber-dark);font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding-top:4px;}

#toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,12px);background:var(--ink);color:#fff;font-size:13.5px;padding:10px 18px;border-radius:99px;box-shadow:0 8px 24px rgba(0,0,0,.2);opacity:0;pointer-events:none;transition:opacity .18s ease,transform .18s ease;z-index:50;max-width:88%;text-align:center;}
#toast.show{opacity:1;transform:translate(-50%,0);}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>

<script>
var ICONS = {
  user: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.5-7 8-7s8 3 8 7"/></svg>',
  phone: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h4l2 5-2.5 1.5a11 11 0 0 0 5 5L15 13l5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z"/></svg>',
  mail: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>',
  pin: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.5 7-12a7 7 0 1 0-14 0c0 5.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>',
  ruler: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="7" width="19" height="10" rx="1.5"/><path d="M6 7v3M10 7v5M14 7v3M18 7v5"/></svg>',
  check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m-9 0 1 14a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2l1-14"/></svg>',
  plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>',
  gear: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 1 1-4 0v-.2a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H3a2 2 0 1 1 0-4h.2a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.6V3a2 2 0 1 1 4 0v.2a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.6 1H21a2 2 0 1 1 0 4h-.2a1.7 1.7 0 0 0-1.5 1z"/></svg>',
  save: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>',
  search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>',
  house: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>',
  clipboard: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="16" rx="2"/><path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1M9 10h6M9 14h6"/></svg>',
  x: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>',
  reset: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg>',
  download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0-4-4m4 4 4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>'
};

var STORAGE_KEYS = { settings: 'quickquote_settings', quotes: 'quickquote_quotes' };

var DEFAULT_TIERS = [
  { id:'t1', name:'Basic', base:275, rate:0.08, description:'Structure, roof, electrical & plumbing.' },
  { id:'t2', name:'Standard', base:375, rate:0.12, description:'Basic plus appliances, HVAC & crawlspace/attic.' },
  { id:'t3', name:'Premium', base:495, rate:0.16, description:'Full inspection with thermal imaging & detailed report.' }
];
var DEFAULT_ADDONS = [
  { id:'a1', name:'Radon Testing', price:150 },
  { id:'a2', name:'Termite / WDO Inspection', price:85 },
  { id:'a3', name:'Mold Assessment', price:200 },
  { id:'a4', name:'Well Water Testing', price:150 },
  { id:'a5', name:'Septic Inspection', price:275 },
  { id:'a6', name:'Sewer Scope', price:175 },
  { id:'a7', name:'Pool & Spa Inspection', price:125 },
  { id:'a8', name:'Four-Point Inspection', price:150 }
];

var state = {
  view: 'quote',
  tiers: [], addons: [], quotes: [],
  form: { name:'', phone:'', email:'', address:'', sqft:'', tierId:null, addonIds:[], notes:'' },
  expandedQuoteId: null, confirmDeleteId: null, savedSearch: '', confirmResetSettings: false
};

function uid(p){ return p+'-'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function currency(n){ n = isFinite(n) ? n : 0; return '$' + Math.round(n).toLocaleString('en-US'); }
function tierPrice(t, sqftVal){ var s=parseFloat(sqftVal)||0, base=parseFloat(t.base)||0, rate=parseFloat(t.rate)||0; return Math.round(base+rate*s); }
function formatDate(iso){ try{ var d=new Date(iso); return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }catch(e){ return ''; } }
function escapeHtml(str){ return String(str==null?'':str).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function icon(name){ return '<span class="icon">'+ICONS[name]+'</span>'; }

function loadState(){
  try{
    var s = localStorage.getItem(STORAGE_KEYS.settings);
    if (s){ var p = JSON.parse(s); state.tiers = (p.tiers && p.tiers.length) ? p.tiers : DEFAULT_TIERS; state.addons = p.addons || DEFAULT_ADDONS; }
    else { state.tiers = JSON.parse(JSON.stringify(DEFAULT_TIERS)); state.addons = JSON.parse(JSON.stringify(DEFAULT_ADDONS)); saveSettings(); }
  }catch(e){ state.tiers = JSON.parse(JSON.stringify(DEFAULT_TIERS)); state.addons = JSON.parse(JSON.stringify(DEFAULT_ADDONS)); }
  try{
    var q = localStorage.getItem(STORAGE_KEYS.quotes);
    state.quotes = q ? JSON.parse(q) : [];
  }catch(e){ state.quotes = []; }
}
function saveSettings(){ try{ localStorage.setItem(STORAGE_KEYS.settings, JSON.stringify({tiers:state.tiers, addons:state.addons})); }catch(e){ showToast("Couldn't save settings"); } }
function saveQuotes(){ try{ localStorage.setItem(STORAGE_KEYS.quotes, JSON.stringify(state.quotes)); }catch(e){ showToast("Couldn't save — device storage full?"); } }

function selectedTier(){ var f=state.form; return state.tiers.filter(function(t){return t.id===f.tierId;})[0] || null; }
function addonsTotal(){ return state.addons.filter(function(a){return state.form.addonIds.indexOf(a.id)>-1;}).reduce(function(s,a){return s+(parseFloat(a.price)||0);},0); }
function grandTotal(){ var t=selectedTier(); var tp = t ? tierPrice(t, state.form.sqft) : 0; return tp + addonsTotal(); }

function showToast(msg){
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2200);
}

/* ---------- render ---------- */
function render(){
  document.getElementById('app').innerHTML = renderHeader() + renderTabs() + '<div id="view-root">' + renderCurrentView() + '</div>';
}
function renderCurrentView(){
  if (state.view==='quote') return renderQuoteView();
  if (state.view==='saved') return renderSavedView();
  return renderSettingsView();
}
function renderHeader(){
  return '' +
  '<div class="header"><div class="house">'+ICONS.house+'</div>' +
    '<div class="header-inner">' +
      '<p class="eyebrow">Field Estimate Tool</p>' +
      '<h1>Quick Quote</h1>' +
      '<p class="tag">Home inspection pricing, on site.</p>' +
    '</div>' +
  '</div>';
}
function renderTabs(){
  var tabs = [
    {k:'quote', label:'New Quote', icon:'clipboard'},
    {k:'saved', label:'Saved', icon:'save'},
    {k:'settings', label:'Settings', icon:'gear'}
  ];
  return '<div class="tabs">' + tabs.map(function(t){
    var badge = (t.k==='saved' && state.quotes.length>0) ? '<span class="badge">'+state.quotes.length+'</span>' : '';
    return '<button class="tab'+(state.view===t.k?' active':'')+'" data-action="set-view" data-view="'+t.k+'">' +
      '<span class="icon">'+ICONS[t.icon]+'</span><span>'+t.label+badge+'</span></button>';
  }).join('') + '</div>';
}

function renderQuoteView(){
  var f = state.form;
  var tiersHtml = state.tiers.map(function(t){
    var selected = f.tierId===t.id;
    return '<button class="tier-card'+(selected?' selected':'')+'" data-action="select-tier" data-tier-id="'+t.id+'">' +
      (selected ? '<span class="stamp">Selected</span>' : '') +
      '<p class="t-name">'+escapeHtml(t.name)+'</p>' +
      '<span class="t-price mono" id="price-'+t.id+'">'+currency(tierPrice(t,f.sqft))+'</span>' +
      '<p class="t-desc">'+escapeHtml(t.description)+'</p>' +
    '</button>';
  }).join('');

  var addonsHtml = state.addons.map(function(a){
    var selected = f.addonIds.indexOf(a.id)>-1;
    return '<button class="addon-row'+(selected?' selected':'')+'" data-action="toggle-addon" data-addon-id="'+a.id+'">' +
      '<span class="left"><span class="dot">'+(selected?icon('check'):'')+'</span><span class="name">'+escapeHtml(a.name)+'</span></span>' +
      '<span class="price mono">+'+currency(parseFloat(a.price)||0)+'</span>' +
    '</button>';
  }).join('');

  return '' +
  '<div class="section"><div class="section-head"><span class="num mono">01</span><h2>Client Details</h2></div>' +
    '<div class="field">'+icon('user')+'<input placeholder="Client name" data-field="name" value="'+escapeHtml(f.name)+'"></div>' +
    '<div class="field">'+icon('phone')+'<input type="tel" placeholder="Phone number" data-field="phone" value="'+escapeHtml(f.phone)+'"></div>' +
    '<div class="field">'+icon('mail')+'<input type="email" placeholder="Email address" data-field="email" value="'+escapeHtml(f.email)+'"></div>' +
    '<div class="field">'+icon('pin')+'<input placeholder="Property address (optional)" data-field="address" value="'+escapeHtml(f.address)+'"></div>' +
  '</div>' +

  '<div class="section"><div class="section-head"><span class="num mono">02</span><h2>Property Size</h2></div>' +
    '<div class="field">'+icon('ruler')+'<input type="number" inputmode="numeric" placeholder="Square footage" data-field="sqft" value="'+escapeHtml(f.sqft)+'" class="mono"><span class="suffix">sq ft</span></div>' +
  '</div>' +

  '<div class="section"><div class="section-head"><span class="num mono">03</span><h2>Inspection Tier</h2></div>' +
    '<div class="tier-grid">'+tiersHtml+'</div>' +
  '</div>' +

  '<div class="section"><div class="section-head"><span class="num mono">04</span><h2>Add-Ons</h2></div>' +
    addonsHtml +
  '</div>' +

  '<div class="section" style="border-bottom:none;">' +
    '<div class="field no-icon"><textarea rows="2" placeholder="Notes for this quote (optional)" data-field="notes">'+escapeHtml(f.notes)+'</textarea></div>' +
  '</div>' +

  '<div class="footer">' +
    '<div><p class="label">Total Estimate</p><p class="amount mono" id="total-amount">'+currency(grandTotal())+'</p></div>' +
    '<button class="save-btn" data-action="save-quote">'+icon('save')+'<span>Save Quote</span></button>' +
  '</div>';
}

function quotesListInner(){
  if (state.quotes.length===0){
    return '<div class="empty">'+icon('clipboard')+'<p class="t1">No saved quotes yet</p><p class="t2">Build one from the New Quote tab.</p></div>';
  }
  var q = state.savedSearch.toLowerCase();
  var filtered = state.quotes.filter(function(item){ return item.client.name.toLowerCase().indexOf(q)>-1; });
  if (filtered.length===0){
    return '<p style="text-align:center;color:var(--muted);font-size:14px;padding:32px 0;">No quotes match "'+escapeHtml(state.savedSearch)+'"</p>';
  }
  return filtered.map(function(item){
    var expanded = state.expandedQuoteId===item.id;
    var head = '<button class="head" data-action="toggle-expand" data-quote-id="'+item.id+'">' +
      '<div style="min-width:0;"><p class="name">'+escapeHtml(item.client.name)+'</p>' +
      '<p class="meta">'+formatDate(item.createdAt)+' &middot; '+escapeHtml(item.tier.name)+' &middot; '+Number(item.sqft).toLocaleString()+' sq ft</p></div>' +
      '<p class="total mono">'+currency(item.total)+'</p>' +
    '</button>';
    var detail = '';
    if (expanded){
      var contact = '';
      if (item.client.phone) contact += '<div>'+icon('phone')+'<span>'+escapeHtml(item.client.phone)+'</span></div>';
      if (item.client.email) contact += '<div>'+icon('mail')+'<span>'+escapeHtml(item.client.email)+'</span></div>';
      if (item.client.address) contact += '<div>'+icon('pin')+'<span>'+escapeHtml(item.client.address)+'</span></div>';
      var addonLines = item.addons.map(function(a){ return '<div class="line"><span>'+escapeHtml(a.name)+'</span><span class="mono">+'+currency(a.price)+'</span></div>'; }).join('');
      var notes = item.notes ? '<div class="notes">'+escapeHtml(item.notes)+'</div>' : '';
      var confirm = '';
      if (state.confirmDeleteId===item.id){
        confirm = '<div class="confirm-row"><span>Delete this quote?</span>' +
          '<button class="btn-outline" data-action="cancel-delete">Cancel</button>' +
          '<button class="btn-danger" data-action="confirm-delete" data-quote-id="'+item.id+'">Delete</button></div>';
      } else {
        confirm = '<button class="link-danger" data-action="request-delete" data-quote-id="'+item.id+'">'+icon('trash')+'<span>Delete quote</span></button>';
      }
      detail = '<div class="detail">' +
        (contact ? '<div class="contact">'+contact+'</div>' : '') +
        '<div class="line"><span>'+escapeHtml(item.tier.name)+' inspection</span><span class="mono">'+currency(item.tier.price)+'</span></div>' +
        addonLines + notes +
        '<div class="sum"><span class="k">Total</span><span class="v mono">'+currency(item.total)+'</span></div>' +
        confirm +
      '</div>';
    }
    return '<div class="quote-card">'+head+detail+'</div>';
  }).join('');
}
function renderQuotesList(){
  var el = document.getElementById('quotes-list');
  if (el) el.innerHTML = quotesListInner();
}
function renderSavedView(){
  var search = state.quotes.length>0 ?
    '<div class="search-field">'+icon('search')+'<input placeholder="Search by client name" data-field="search" value="'+escapeHtml(state.savedSearch)+'"></div>' : '';
  return '<div class="section" style="border-bottom:none;">' + search + '<div id="quotes-list">'+quotesListInner()+'</div></div>';
}

function renderSettingsView(){
  var tiersHtml = state.tiers.map(function(t){
    return '<div class="settings-tier">' +
      '<input class="name-input" data-field="tier-name" data-tier-id="'+t.id+'" value="'+escapeHtml(t.name)+'">' +
      '<div class="settings-row">' +
        '<div class="col"><label>Base price</label><div class="prefixed"><span>$</span><input type="number" class="mono" data-field="tier-base" data-tier-id="'+t.id+'" value="'+escapeHtml(t.base)+'"></div></div>' +
        '<div class="col"><label>Rate / sq ft</label><div class="prefixed"><span>$</span><input type="number" step="0.01" class="mono" data-field="tier-rate" data-tier-id="'+t.id+'" value="'+escapeHtml(t.rate)+'"></div></div>' +
      '</div>' +
      '<label style="font-size:10.5px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:3px;">Description</label>' +
      '<input class="desc-input" data-field="tier-desc" data-tier-id="'+t.id+'" value="'+escapeHtml(t.description)+'">' +
    '</div>';
  }).join('');

  var addonsHtml = state.addons.map(function(a){
    return '<div class="addon-edit-row">' +
      '<input class="name" data-field="addon-name" data-addon-id="'+a.id+'" value="'+escapeHtml(a.name)+'">' +
      '<div class="prefixed"><span>$</span><input type="number" class="mono" data-field="addon-price" data-addon-id="'+a.id+'" value="'+escapeHtml(a.price)+'"></div>' +
      '<button data-action="remove-addon" data-addon-id="'+a.id+'">'+icon('x')+'</button>' +
    '</div>';
  }).join('');

  var resetRow = state.confirmResetSettings ?
    '<div class="confirm-row"><span>Reset all pricing to defaults?</span>' +
      '<button class="btn-outline" data-action="cancel-reset-settings">Cancel</button>' +
      '<button class="btn-danger" data-action="confirm-reset-settings">Reset</button></div>' :
    '<button class="link-muted" data-action="request-reset-settings">'+icon('reset')+'<span>Reset pricing to defaults</span></button>';

  return '' +
  '<div class="section"><div class="section-head"><span class="num mono">01</span><h2>Tier Pricing</h2></div>'+tiersHtml+'</div>' +
  '<div class="section"><div class="section-head"><span class="num mono">02</span><h2>Add-On Pricing</h2></div>' +
    addonsHtml +
    '<button class="add-addon-btn" data-action="add-addon">'+icon('plus')+'<span>Add option</span></button>' +
  '</div>' +
  '<div class="section" style="border-bottom:none;"><div class="section-head"><span class="num mono">03</span><h2>Data</h2></div>' +
    '<button class="link-muted" data-action="export-quotes" style="margin-bottom:10px;">'+icon('download')+'<span>Export saved quotes as backup</span></button><br>' +
    resetRow +
  '</div>';
}

/* ---------- actions ---------- */
function setTierField(id,key,val){ var t=state.tiers.filter(function(x){return x.id===id;})[0]; if(t) t[key]=val; }
function setAddonField(id,key,val){ var a=state.addons.filter(function(x){return x.id===id;})[0]; if(a) a[key]=val; }

function resetForm(){ state.form={name:'',phone:'',email:'',address:'',sqft:'',tierId:null,addonIds:[],notes:''}; }

function handleSaveQuote(){
  var f = state.form;
  if (!f.name.trim() || !f.sqft || !f.tierId){ showToast('Add client name, square footage & a tier'); return; }
  var tier = selectedTier();
  var chosenAddons = state.addons.filter(function(a){return f.addonIds.indexOf(a.id)>-1;}).map(function(a){return {id:a.id,name:a.name,price:parseFloat(a.price)||0};});
  var quote = {
    id: uid('q'), createdAt: new Date().toISOString(),
    client: { name:f.name.trim(), phone:f.phone.trim(), email:f.email.trim(), address:f.address.trim() },
    sqft: parseFloat(f.sqft)||0,
    tier: { id:tier.id, name:tier.name, price: tierPrice(tier,f.sqft) },
    addons: chosenAddons,
    addonsTotal: chosenAddons.reduce(function(s,a){return s+a.price;},0),
    total: grandTotal(),
    notes: f.notes.trim()
  };
  state.quotes.unshift(quote);
  saveQuotes();
  showToast('Quote saved');
  resetForm();
  render();
}
function handleDeleteQuote(id){
  state.quotes = state.quotes.filter(function(q){return q.id!==id;});
  saveQuotes();
  state.confirmDeleteId = null;
  if (state.expandedQuoteId===id) state.expandedQuoteId = null;
  showToast('Quote deleted');
  render();
}
function exportQuotes(){
  try{
    var data = JSON.stringify(state.quotes, null, 2);
    var blob = new Blob([data], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'quick-quote-backup-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Backup downloaded');
  }catch(e){ showToast('Export failed'); }
}
function updateTierPricesAndTotal(){
  state.tiers.forEach(function(t){
    var el = document.getElementById('price-'+t.id);
    if (el) el.textContent = currency(tierPrice(t, state.form.sqft));
  });
  var totalEl = document.getElementById('total-amount');
  if (totalEl) totalEl.textContent = currency(grandTotal());
}

/* ---------- event delegation ---------- */
function onAppClick(e){
  var btn = e.target.closest('[data-action]');
  if (!btn) return;
  var action = btn.dataset.action;
  if (action==='set-view'){ state.view=btn.dataset.view; state.expandedQuoteId=null; state.confirmDeleteId=null; render(); }
  else if (action==='select-tier'){ state.form.tierId=btn.dataset.tierId; render(); }
  else if (action==='toggle-addon'){ var id=btn.dataset.addonId; var idx=state.form.addonIds.indexOf(id); if(idx>-1) state.form.addonIds.splice(idx,1); else state.form.addonIds.push(id); render(); }
  else if (action==='save-quote'){ handleSaveQuote(); }
  else if (action==='toggle-expand'){ var qid=btn.dataset.quoteId; state.expandedQuoteId = state.expandedQuoteId===qid ? null : qid; state.confirmDeleteId=null; render(); }
  else if (action==='request-delete'){ state.confirmDeleteId=btn.dataset.quoteId; render(); }
  else if (action==='cancel-delete'){ state.confirmDeleteId=null; render(); }
  else if (action==='confirm-delete'){ handleDeleteQuote(btn.dataset.quoteId); }
  else if (action==='add-addon'){ state.addons.push({id:uid('a'),name:'New Add-on',price:0}); saveSettings(); render(); }
  else if (action==='remove-addon'){ var aid=btn.dataset.addonId; state.addons=state.addons.filter(function(a){return a.id!==aid;}); state.form.addonIds=state.form.addonIds.filter(function(x){return x!==aid;}); saveSettings(); render(); }
  else if (action==='request-reset-settings'){ state.confirmResetSettings=true; render(); }
  else if (action==='cancel-reset-settings'){ state.confirmResetSettings=false; render(); }
  else if (action==='confirm-reset-settings'){ state.tiers=JSON.parse(JSON.stringify(DEFAULT_TIERS)); state.addons=JSON.parse(JSON.stringify(DEFAULT_ADDONS)); state.confirmResetSettings=false; saveSettings(); showToast('Settings reset to defaults'); render(); }
  else if (action==='export-quotes'){ exportQuotes(); }
}
function onAppInput(e){
  var field = e.target.dataset.field;
  if (!field) return;
  var v = e.target.value;
  if (field==='name') state.form.name=v;
  else if (field==='phone') state.form.phone=v;
  else if (field==='email') state.form.email=v;
  else if (field==='address') state.form.address=v;
  else if (field==='notes') state.form.notes=v;
  else if (field==='sqft'){ state.form.sqft=v; updateTierPricesAndTotal(); }
  else if (field==='search'){ state.savedSearch=v; renderQuotesList(); }
  else if (field==='tier-name') setTierField(e.target.dataset.tierId,'name',v);
  else if (field==='tier-base') setTierField(e.target.dataset.tierId,'base',v);
  else if (field==='tier-rate') setTierField(e.target.dataset.tierId,'rate',v);
  else if (field==='tier-desc') setTierField(e.target.dataset.tierId,'description',v);
  else if (field==='addon-name') setAddonField(e.target.dataset.addonId,'name',v);
  else if (field==='addon-price') setAddonField(e.target.dataset.addonId,'price',v);
}
function onAppBlur(e){
  var field = e.target.dataset.field;
  if (!field) return;
  if (field.indexOf('tier-')===0 || field.indexOf('addon-')===0){ saveSettings(); showToast('Settings saved'); }
}

document.addEventListener('DOMContentLoaded', function(){
  loadState();
  render();
  var app = document.getElementById('app');
  app.addEventListener('click', onAppClick);
  app.addEventListener('input', onAppInput);
  app.addEventListener('blur', onAppBlur, true);
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){ /* offline-first still works without it */ });
  });
}
</script>
</body>
</html>
